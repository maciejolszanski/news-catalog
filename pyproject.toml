[project]
name = "news-catalog"
version = "0.1.0"
description = "A news catalog application that helps stay informed and filter articles."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "appdata>=2.2.1",
    "beautifulsoup4>=4.14.3",
    "colored>=2.3.2",
    "freezegun>=1.5.5",
    "mongomock>=4.3.0",
    "pandas>=3.0.2",
    "pymongo>=4.17.0",
    "python-decouple>=3.8",
    "scrapy>=2.15.0",
    "streamlit>=1.56.0",
]

[tool.black]
line-length = 79
extend-exclude = '''
    # Scrapy settings are generated by default
    ^/news_catalog/scrapy_project/scrapy_project/settings.py
'''

[dependency-groups]
dev = [
    "flake8>=7.3.0",
    "pre-commit>=4.5.1",
    "pytest>=9.0.3",
]
